<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f0f;margin:0;padding:20px}
.wrap{max-width:560px;margin:0 auto;background:#1a1a1a;border-radius:16px;overflow:hidden;border:1px solid #2a2a2a}
.header{background:linear-gradient(135deg,#065f46,#047857);padding:32px;text-align:center}
.header h1{color:#fff;margin:0;font-size:24px}
.body{padding:32px;text-align:center}
.icon{font-size:64px;margin:16px 0}
.btn{display:inline-block;background:#059669;color:#fff;text-decoration:none;padding:14px 36px;border-radius:10px;font-weight:600;font-size:15px;margin:20px 0}
.footer{text-align:center;padding:20px;color:#555;font-size:12px;border-top:1px solid #222}
h2{color:#fff;font-size:20px}
p{color:#aaa;font-size:14px;line-height:1.6}
</style></head>
<body>
<div class="wrap">
  <div class="header"><h1>✅ Seller Account Ready!</h1></div>
  <div class="body">
    <div class="icon">🏦</div>
    <h2>You can now receive payments!</h2>
    <p>Hey {{ user.first_name|default:user.username }}, your Stripe account is connected and verified. Buyers can now purchase your products and payments will be sent directly to your bank account.</p>
    <a href="{{ frontend_url }}/products/add" class="btn">List Your First Product</a>
  </div>
  <div class="footer">© Local Market</div>
</div>
</body></html>
